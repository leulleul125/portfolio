{% extends "base.html" %}

{% block content %}
<div class="container">
    <section class="px-5 py-5 mt-5 mb-5">
        <h1>Hi, I am {{student.name}}</h1>
        <p class="fw-bold">{{student.role}}</p>
        <div class="row">
            <div class="col-12 col-md-6">
                <p>{{student.bio}}</p>
            </div>
        </div>
        <h2>Skills</h2>
        {% for skill in student.skill %}
            <span class="btn btn-outline-secondary btn-md rounded-3 m-1">{{skill}}</span>
        {% endfor %}
    </section>
</div>

{% endblock %}

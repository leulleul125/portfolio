{% extends "base.html" %}

{% block content %}
<div class="container">
    <section class="px-5 py-5">
        <h1>Hi, I am {{student.name}}</h1>
        <p>{{student.role}}</p>
        <p class="w-50" style="line-height: 28px;">{{student.bio}}</p>
        <h2>Skills</h2>
        {% for skill in student.skill %}
            <span class="btn btn-outline-secondary btn-md rounded-3">{{skill}}</span>
        {% endfor %}
    </section>
</div>

{% endblock %}
